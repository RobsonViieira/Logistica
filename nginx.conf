# ── Nginx Reverse Proxy para EC2 Rovieso ─────────────────────
# Coloque em /etc/nginx/sites-available/glm
# e symlink: ln -s /etc/nginx/sites-available/glm /etc/nginx/sites-enabled/

upstream glm_backend {
    server 127.0.0.1:8000;
}

upstream glm_frontend {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name guiorobson.mooo.com;  # seu domínio

    # Redireciona HTTP → HTTPS (após configurar certbot)
    # return 301 https://$host$request_uri;

    # ── Backend API ─────────────────────────────────────────
    location /api/ {
        proxy_pass http://glm_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS headers (backup)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # ── Docs da API (Swagger) ───────────────────────────────
    location /docs {
        proxy_pass http://glm_backend/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://glm_backend/openapi.json;
    }

    # ── Frontend React ──────────────────────────────────────
    location / {
        proxy_pass http://glm_frontend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Logs
    access_log /var/log/nginx/glm_access.log;
    error_log /var/log/nginx/glm_error.log;
}

