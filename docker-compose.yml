version: "3.9"

services:
  # ── Backend FastAPI ─────────────────────────────────────────
  backend:
    build: ./backend
    container_name: glm_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////data/glm.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - glm_data:/data     # Persiste o banco SQLite
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend React ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000  # Ajuste para URL do EC2
    container_name: glm_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  glm_data:
    driver: local
